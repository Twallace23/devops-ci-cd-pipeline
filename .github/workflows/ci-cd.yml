name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t devops-app -f docker/Dockerfile .

    - name: Run container test
      run: |
        docker run -d -p 5000:5000 devops-app
        sleep 5
        curl http://localhost:5000